<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<style>
body{font-family:Arial;background:#f3f0e3;padding:30px;}
.detail{display:flex;background:white;padding:20px;}
.detail img{width:300px;margin-right:20px;}
.price{color:red;font-size:20px;}
button{padding:10px;background:green;color:white;border:none;}
</style>
</head>

<body>

<div class="detail">
<img id="img">
<div>
<h1 id="ten"></h1>
<p class="price" id="gia"></p>

<p>Đây là tờ báo cung cấp thông tin mới nhất.</p>

<button onclick="mua()">Mua ngay</button>
</div>
</div>

<script>
const p = new URLSearchParams(location.search);

let ten = p.get("ten");
let gia = p.get("gia");
let img = p.get("img");

document.getElementById("ten").innerText = ten;
document.getElementById("gia").innerText = gia + " VND";
document.getElementById("img").src = img;

function mua(){
    alert("Bạn đã mua: " + ten);
}
</script>

</body>
</html>
