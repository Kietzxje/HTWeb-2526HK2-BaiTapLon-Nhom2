<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nhóm 2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html{
    font-family: Arial, sans-serif;
}

body {
    background: #f5f5f5;
}

        .header{
             display: flex;
    align-items: center;
    justify-content: space-between;
    background: darkgreen;
    color: white;
    padding: 15px 40px;
        }

        .header input{
            margin-left: 300px;
            width: 30%;
            padding: 8px;
        }

        .nav{
            display: flex;
    justify-content: center;
    background: #333;
    list-style: none;
    width: 100%;
    position: sticky;
    top: 0;
        }

        .nav li a{
            display: block;
    padding: 12px 20px;
    color: white;
    text-decoration: none;
    transition: 0.3s;

        }

        
        button {
    background-color: black;
    color: white;
    padding: 8px 12px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}
.search {
    display: flex;
    align-items: center;
    gap: 5px;
}

.search input {
    padding: 8px;
    width: 250px;
    border: none;
    border-radius: 10px;
}


        .main-banner {
            width: 100%;
            margin: 0;
            padding: 0;
            line-height: 0;
        }

        .main-banner img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: cover;
        }


        .footer {
            text-align: center;
            padding: 20px;
            background: #333;
            color: white;
            width: 100%;
        }

        .user {
            text-decoration: none;
            color: white;
        }
    </style>
</head>
<body>

<header class="header">
    <div class="logo">WEB Nhóm 2</div>
    <input type="text" placeholder="Tìm kiếm sách...">
    <button class="nut">Tìm kiếm</button>
    <a href="cart.html" class="user">Giỏ hàng</a>
</header>

<ul class="nav">
    <li><a href="index.html">Trang chủ</a></li>
    <li><a href="baomoi.html">Báo hằng ngày</a></li>
    <li><a href="#">Khuyến mãi</a></li>
    <li><a href="#">Liên hệ</a></li>
</ul>

<div class="main-banner">
    <img src="../assets/images/bg-breadcrumb.png" alt="Banner máy bay">
</div>

<div class="modal fade" id="success" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h4 class="modal-title">Thông báo!</h4>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        Đặt báo thành công!
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-danger" data-bs-dismiss="modal">Đóng</button>
      </div>
    </div>
  </div>
</div>

<footer class="footer">
    © 2026 Nhóm 2
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
