<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nhóm 2</title>
    <link rel="stylesheet" href="../css/cart.css" />
  </head>
  <body>
    <header class="header">
    <div class="logo">WEB Nhóm 2</div>
    <input type="text" placeholder="Tìm kiếm sách...">
    <button class="nut">Tìm kiếm</button>
    <a href="#" class="user">Giỏ hàng</a>
</header>

<ul class="nav">
    <li><a href="index.html">Trang chủ</a></li>
    <li><a href="baomoi.html">Báo hằng ngày</a></li>
    <li><a href="#">Khuyến mãi</a></li>
    <li><a href="#">Liên hệ</a></li>
</ul>

<div class="main">
    <div class="container">

    <div class="left">
      <h1>Danh sách báo</h1>

      <div class="products">
        <div class="product">
          <h3>Báo nhân dân cuối tuần</h3>
          <p>Giá: 4800đ</p>
          <button onclick="addToCart('Báo nhân dân cuối tuần', 4800)">
            Thêm vào giỏ
          </button>
        </div>

        <div class="product">
          <h3>Báo nhân dân hàng tháng</h3>
          <p>Giá: 9800đ</p>
          <button onclick="addToCart('Báo nhân dân hàng tháng', 9800)">
            Thêm vào giỏ
          </button>
        </div>
      </div>
    </div>

    <div class="right">
      <div id="cart">
        <h2>Giỏ hàng</h2>

        <table>
          <thead>
            <tr>
              <th>Tên</th>
              <th>Giá</th>
              <th>SL</th>
              <th>Tổng</th>
              <th>Xóa</th>
            </tr>
          </thead>
          <tbody id="cart-items"></tbody>
        </table>

        <h3>Tổng tiền: <span id="total-price">0</span> đ</h3>

        <button onclick="checkout()">Mua</button>
      </div>
    </div>

  </div>
</div>

<footer class="footer">
    © 2026 Nhóm 2
</footer>
    <script src="../js/cart.js"></script>
  </body>
</html>
