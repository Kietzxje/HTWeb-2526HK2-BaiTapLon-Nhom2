<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../css/allstyle.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
<link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
<script src="../js/banner.js" defer></script>
<script src="../js/SignUp_LogIn.js" defer></script>
<style>
body { 
  font-family:Arial;
  background:#f3f0e3;
  padding:30px;
}
.detail {
  display:flex;background:white;
  padding:20px;}
.detail img{
  width:300px;
  margin-right:20px;
}
.price {
  color:red;
  font-size:20px;}
button {
  padding:10px;
  background:green;
  color:white;
  border:none;
  }
</style>
</head>

<body>
<header>
      <div class="banner">
        <div class="bg active"></div>
        <div class="bg"></div>
        <div class="dots">
                <span class="dot active" data-index="0"></span>
                <span class="dot" data-index="1"></span>
                <span class="dot" data-index="2"></span>
            </div>
        <div class="nav">
          <a href="TrangChu.html" class="linklogo">
            <img src="../assets/images/logo.png" alt="" class="logo">
          </a>
          <ul class="menu">
            <li><a href="TrangChu.html">Trang chủ</a></li>
            <li><a href="BaoHangNgay.html">Báo hằng ngày</a></li>
            <li><a href="#">Khuyến mãi</a></li>
            <li><a href="#">Liên hệ</a></li>
          </ul>
          <form action="" class="search">
            <input type="text" placeholder="Nhập từ khóa tìm kiếm...">
            <button class="nut" href="#"><i class="fa fa-search"></i></button>
          </form>
          <a href="cart.html" class="user">Giỏ hàng</a>
          <img src="../assets/images/User.png" alt="" class="userlogin">
        </div>
    </div>
    <div class="SignUp_LogIn">
          <div class="SignUp_LoginBox">
            <div class="form-box login">
              <form action="#">
                <h1>Đăng Nhập</h1>
                <div class="input-box">
                  <input type="text" placeholder="Tên đăng nhập" required
                  oninvalid="this.setCustomValidity('Tên đăng nhập không hợp lệ')" 
                  oninput="this.setCustomValidity('')">
                  <i class='bx bxs-user'></i>
                </div>
                <div class="input-box">
                  <input type="password" placeholder="Mật khẩu" required
                  oninvalid="this.setCustomValidity('Mật khẩu không hợp lệ')" 
                  oninput="this.setCustomValidity('')">
                  <i class='bx bxs-lock-alt' ></i>
                </div>
                <div class="forgot-link">
                  <a href="#">Quên mật khẩu?</a>
                </div>
                <button type="submit" class="btn">Đăng Nhập</button>
                <p>Hoặc đăng nhập bằng nền tảng khác</p>
                <div class="social-icons">
                  <a href="#"><i class='bx bxl-google' ></i></a>
                  <a href="#"><i class='bx bxl-facebook' ></i></a>
                  <a href="#"><i class='bx bxl-github' ></i></a>
                  <a href="#"><i class='bx bxl-linkedin' ></i></a>
                </div>
              </form>
            </div>  
            <div class="form-box register">
              <form action="#">
                <h1>Đăng Ký</h1>
                <div class="input-box">
                  <input type="text" placeholder="Tên đăng nhập" required
                  oninvalid="this.setCustomValidity('Tên đăng nhập không hợp lệ')" 
                  oninput="this.setCustomValidity('')">
                  <i class='bx bxs-user'></i>
                </div>
                <div class="input-box">
                  <input type="email" placeholder="Email" required
                  oninvalid="this.setCustomValidity('Email không hợp lệ')" 
                  oninput="this.setCustomValidity('')">
                  <i class='bx bxs-envelope' ></i>
                </div>
                <div class="input-box">
                  <input type="password" placeholder="Mật khẩu" required
                  oninvalid="this.setCustomValidity('Mật khẩu không hợp lệ')" 
                  oninput="this.setCustomValidity('')">
                  <i class='bx bxs-lock-alt' ></i>
                </div>
                <button type="submit" class="btn">Đăng Ký</button>
                <p>Hoặc đăng ký bằng nền tảng khác</p>
                <div class="social-icons">
                  <a href="#"><i class='bx bxl-google' ></i></a>
                  <a href="#"><i class='bx bxl-facebook' ></i></a>
                  <a href="#"><i class='bx bxl-github' ></i></a>
                  <a href="#"><i class='bx bxl-linkedin' ></i></a>
                </div>
              </form>
            </div>
            
            <div class="toggle-box">
              <div class="toggle-panel toggle-left">
                <h1>Hello, Welcome!</h1>
                <button class="btn register-btn">Đăng Ký</button>
              </div>
              
              <div class="toggle-panel toggle-right">
                <h1>Welcome Back!</h1>
                <button class="btn login-btn">Đăng Nhập</button>
              </div>
            </div>
          </div>
        </div>
  </header>
<div class="detail">
<img id="img">
<div>
<h1 id="ten"></h1>
<p class="price" id="gia"></p>

<p>Đây là tờ báo cung cấp thông tin mới nhất.</p>

<button onclick="window.location.href='form.html'">Mua ngay</button>
</div>
</div>

<script>
const p = new URLSearchParams(location.search);

let ten = p.get("ten");
let gia = p.get("gia");
let img = p.get("img");

document.getElementById("ten").innerText = ten;
document.getElementById("gia").innerText = gia + " VND";
document.getElementById("img").src = img;

function mua(){
    alert("Bạn đã mua: " + ten);
}
</script>

</body>
</html>
