<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nhóm 2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="../css/form.css">
</head>

<body>

<header class="header">
    <div class="logo">WEB Nhóm 3</div>
    <input type="text" placeholder="Tìm kiếm sách...">
    <button class="nut">Tìm kiếm</button>
    <a href="cart.html" class="user">Giỏ hàng</a>
</header>

<ul class="nav">
    <li><a href="index.html">Trang chủ</a></li>
    <li><a href="baomoi.html">Báo hằng ngày</a></li>
    <li><a href="#">Khuyến mãi</a></li>
    <li><a href="#">Liên hệ</a></li>
</ul>

<div class="main">
    <div class="order-box">
        <h2>Đăng ký đặt báo</h2>

        <form>
            <div class="form-group">
                <input type="text" id="name" placeholder="Họ và tên">
                <small id="nameMsg"></small>
            </div>

            <div class="form-group">
                <input type="tel" id="phone" placeholder="Số điện thoại">
                <small id="phoneMsg"></small>
            </div>

            <div class="form-group">
                <input type="text" id="email" placeholder="Địa chỉ email">
                <small id="emailMsg"></small>
            </div>

            <div class="form-group">
                <input type="text" placeholder="Địa chỉ nhận báo">
            </div>

            <div class="form-group">
                <select id="time">
                    <option value="">-- Chọn thời gian --</option>
                    <option>1 tháng</option>
                    <option>3 tháng</option>
                    <option>6 tháng</option>
                </select>
                <small id="timeMsg"></small>
            </div>

            <div class="form-group">
                <textarea placeholder="Ghi chú"></textarea>
            </div>

            <button type="button" class="btn" onclick="validateForm()">Đặt báo ngay</button>
        </form>
    </div>
</div>
<div class="modal" id="success">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h4 class="modal-title">Thông báo!</h4>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        Đặt báo thành công!
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-danger" data-bs-dismiss="modal">Close</button>
      </div>

    </div>
  </div>
</div>

<footer class="footer">
    © 2026 Nhóm 2
</footer>
<script src="../js/form.js"></script>
</body>
</html>
